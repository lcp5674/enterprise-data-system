# =====================================================
# EDAMS - GitLab CI/CD Pipeline
# 企业数据资产管理系统 CI/CD流水线
# =====================================================

variables:
  # Docker配置
  DOCKER_REGISTRY: registry.example.com
  DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
  
  # Maven配置
  MAVEN_OPTS: "-Dmaven.repo.local=/cache/maven"
  MAVEN_CACHE_DIR: /cache/maven
  
  # Node配置
  NPM_CONFIG_CACHE: /cache/npm
  
  # Flutter配置
  FLUTTER_CACHE_DIR: /cache/flutter
  
  # 项目目录
  BACKEND_PARENT_DIR: microservices/edams-parent
  SERVICES_DIR: services
  FRONTEND_DIR: edams-web
  MOBILE_DIR: edams-mobile
  
  # Java版本
  JDK_VERSION: "17"
  
  # 服务列表
  EDAMS_PARENT_SERVICES: "edams-common,edams-gateway,edams-auth,edams-user,edams-permission,edams-notification,edams-knowledge,edams-llm,edams-chatbot,edams-workflow,edams-lifecycle,edams-version,edams-collaboration,edams-aiops,edams-asset,edge-iot-service,value-service,sla-service,incentive-service,watermark-service,sandbox-service"
  SERVICES_SERVICES: "lineage-service,standard-service,quality-service,governance-engine,portal-service,admin-service,metadata-service,index-service"

# 缓存策略
cache:
  key: ${CI_COMMIT_REF_SLUG}-cache
  paths:
    - /cache/maven/repository
    - /cache/npm
    - /cache/flutter
    - .m2/repository
  policy: pull-push

# 默认配置
default:
  image: maven:3.9-eclipse-temurin-17
  before_script:
    - export MAVEN_OPTS="-Dmaven.repo.local=/cache/maven/repository"
    - mkdir -p /cache/maven/repository
    - mkdir -p /cache/npm
    - mkdir -p /cache/flutter
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# =====================================================
# Pipeline Stages
# =====================================================
stages:
  - build:backend-parent    # 构建edams-parent (21个微服务)
  - build:services          # 构建services (8个微服务)
  - build:frontend          # 构建前端
  - build:mobile             # 构建移动端
  - test                     # 测试阶段
  - security                 # 安全扫描
  - package                  # Docker镜像打包
  - deploy:test              # 部署测试环境
  - deploy:staging           # 部署预发布环境
  - deploy:prod              # 部署生产环境

# =====================================================
# 构建阶段
# =====================================================

# 构建edams-parent公共模块 (所有其他模块依赖)
build:edams-common:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl edams-common -am
    - cp edams-common/target/*.jar ${CI_PROJECT_DIR}/build-output/ || true
  artifacts:
    paths:
      - microservices/edams-parent/edams-common/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-parent核心网关服务
build:edams-gateway:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl edams-gateway -am
  artifacts:
    paths:
      - microservices/edams-parent/edams-gateway/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/edams-gateway/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-auth认证服务
build:edams-auth:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl edams-auth -am
  artifacts:
    paths:
      - microservices/edams-parent/edams-auth/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/edams-auth/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-parent核心业务服务 (并行构建)
build:core-services:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - edams-user
          - edams-permission
          - edams-notification
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - microservices/edams-parent/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/${SERVICE}/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-parent知识智能域服务
build:knowledge-services:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - edams-knowledge
          - edams-llm
          - edams-chatbot
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - microservices/edams-parent/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/${SERVICE}/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-parent高级功能域服务
build:advanced-services:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - edge-iot-service
          - value-service
          - sla-service
          - incentive-service
          - watermark-service
          - sandbox-service
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - microservices/edams-parent/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/${SERVICE}/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建edams-parent运营支撑域服务
build:operation-services:
  stage: build:backend-parent
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - edams-workflow
          - edams-lifecycle
          - edams-version
          - edams-collaboration
          - edams-aiops
          - edams-asset
  needs:
    - build:edams-common
  script:
    - cd microservices/edams-parent
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - microservices/edams-parent/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - microservices/edams-parent/${SERVICE}/**/*
      - microservices/edams-parent/edams-common/**/*
      - microservices/edams-parent/pom.xml

# 构建services独立微服务
build:services-core:
  stage: build:services
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - lineage-service
          - quality-service
          - standard-service
          - governance-engine
  script:
    - cd services
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - services/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - services/${SERVICE}/**/*
      - services/pom.xml

# 构建services支撑服务
build:services-support:
  stage: build:services
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - SERVICE:
          - portal-service
          - admin-service
          - metadata-service
          - index-service
  script:
    - cd services
    - mvn clean package -DskipTests -B -pl ${SERVICE} -am
  artifacts:
    paths:
      - services/${SERVICE}/target/*.jar
    expire_in: 1 day
  only:
    changes:
      - services/${SERVICE}/**/*
      - services/pom.xml

# =====================================================
# 前端构建
# =====================================================

build:frontend:
  stage: build:frontend
  image: node:18-alpine
  before_script:
    - npm config set cache /cache/npm
    - npm ci --cache /cache/npm --prefer-offline
  script:
    - cd edams-web
    - npm install
    - npm run build:prod
    - echo "Frontend build completed"
  artifacts:
    name: frontend-dist
    paths:
      - edams-web/dist
      - edams-web/dist.zip
    expire_in: 1 day
  only:
    changes:
      - edams-web/**/*
  cache:
    key: ${CI_COMMIT_REF_SLUG}-frontend
    paths:
      - /cache/npm
    policy: pull-push

# =====================================================
# 移动端构建
# =====================================================

build:mobile-android:
  stage: build:mobile
  image: cirrusci/flutter:latest
  before_script:
    - flutter config --no-analytics
    - flutter precache
  script:
    - cd edams-mobile
    - flutter pub get
    - flutter build apk --release
    - ls -la build/app/outputs/flutter-apk/
  artifacts:
    name: mobile-android
    paths:
      - edams-mobile/build/app/outputs/flutter-apk/*.apk
    expire_in: 7 days
  only:
    changes:
      - edams-mobile/**/*
  tags:
    - flutter

build:mobile-ios:
  stage: build:mobile
  image: cirrusci/flutter:latest
  before_script:
    - flutter config --no-analytics
    - flutter precache
    - xcodebuild -version
    - xcrun simctl list devices available
  script:
    - cd edams-mobile
    - flutter pub get
    - flutter build ios --release --no-codesign
    - ls -la build/ios/iphoneos/
  artifacts:
    name: mobile-ios
    paths:
      - edams-mobile/build/ios/iphoneos/*.app
    expire_in: 7 days
  only:
    changes:
      - edams-mobile/**/*
  when: manual
  tags:
    - flutter
    - ios

# =====================================================
# 测试阶段
# =====================================================

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  parallel:
    matrix:
      - PROJECT_DIR:
          - microservices/edams-parent
          - services
  script:
    - cd ${PROJECT_DIR}
    - mvn test -B -Dsurefire.useFile=false -DforkCount=2 -DreuseForks=true
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    name: test-results-${PROJECT_DIR}
    paths:
      - microservices/edams-parent/target/surefire-reports
      - services/target/surefire-reports
    reports:
      junit:
        - microservices/edams-parent/target/surefire-reports/TEST-*.xml
        - services/target/sureure-reports/TEST-*.xml
    expire_in: 7 days
  coverage_report:
    coverage_format: cobertura
    path: microservices/edams-parent/target/site/cobertura/coverage.xml
  only:
    changes:
      - microservices/edams-parent/**/*
      - services/**/*
  retry:
    max: 1

test:frontend:
  stage: test
  image: node:18-alpine
  before_script:
    - npm config set cache /cache/npm
  script:
    - cd edams-web
    - npm install
    - npm run test -- --coverage --passWithNoTests
  coverage: '/All files[^|]*\|[^|]*\s+([0-9]{1,3})/'
  artifacts:
    name: frontend-test-results
    paths:
      - edams-web/coverage
    expire_in: 7 days
  only:
    changes:
      - edams-web/**/*

test:e2e:
  stage: test
  image: node:18-alpine
  services:
    - docker:dind
  before_script:
    - npm config set cache /cache/npm
    - npx playwright install --with-deps chromium
  script:
    - cd e2e-tests
    - npm install
    - npm run test:docker || npm run test
  artifacts:
    when: always
    paths:
      - e2e-tests/test-results/
      - e2e-tests/playwright-report/
      - e2e-tests/screenshots/
    expire_in: 14 days
  only:
    changes:
      - e2e-tests/**/*
      - edams-web/**/*
  allow_failure: true

# =====================================================
# 安全扫描阶段
# =====================================================

security:dependency-check:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd microservices/edams-parent
    - mvn org.owasp:dependency-check-maven:check -B -DskipTests -DconnectionString=
    - echo "Dependency check completed"
  artifacts:
    paths:
      - microservices/edams-parent/target/dependency-check-report.html
    expire_in: 30 days
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

security:trivy-scan:
  stage: security
  image: aquasec/trivy:latest
  before_script:
    - trivy version
  script:
    - trivy image --severity HIGH,CRITICAL ${DOCKER_REGISTRY}/edams:${CI_COMMIT_SHORT_SHA} || echo "Image scan completed"
    - trivy filesystem --severity HIGH,CRITICAL . --scanners vuln,config,secret || echo "Filesystem scan completed"
  artifacts:
    paths:
      - trivy-report.json
    expire_in: 30 days
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

# =====================================================
# Docker镜像打包阶段
# =====================================================

package:backend-images:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  parallel:
    matrix:
      - SERVICE_DIR:
          - microservices/edams-parent/edams-gateway
          - microservices/edams-parent/edams-auth
          - microservices/edams-parent/edams-user
          - microservices/edams-parent/edams-permission
          - microservices/edams-parent/edams-notification
          - microservices/edams-parent/edams-knowledge
          - microservices/edams-parent/edams-llm
          - microservices/edams-parent/edams-chatbot
          - microservices/edams-parent/edams-workflow
          - microservices/edams-parent/edams-lifecycle
          - microservices/edams-parent/edams-version
          - microservices/edams-parent/edams-collaboration
          - microservices/edams-parent/edams-aiops
          - microservices/edams-parent/edams-asset
          - microservices/edams-parent/edge-iot-service
          - microservices/edams-parent/value-service
          - microservices/edams-parent/sla-service
          - microservices/edams-parent/incentive-service
          - microservices/edams-parent/watermark-service
          - microservices/edams-parent/sandbox-service
          - services/lineage-service
          - services/quality-service
          - services/standard-service
          - services/governance-engine
          - services/portal-service
          - services/admin-service
          - services/metadata-service
          - services/index-service
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${DOCKER_REGISTRY} || echo "Docker login completed"
    - SERVICE_NAME=$(basename ${SERVICE_DIR})
  script:
    - |
      SERVICE_NAME=$(basename ${SERVICE_DIR})
      cd ${SERVICE_DIR}
      if [ -f target/${SERVICE_NAME}-*.jar ]; then
        JAR_FILE=$(ls target/${SERVICE_NAME}-*.jar | head -1)
        docker build \
          --build-arg JAR_FILE=${JAR_FILE} \
          --build-arg SERVICE_NAME=${SERVICE_NAME} \
          -t ${DOCKER_REGISTRY}/edams-${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA} \
          -t ${DOCKER_REGISTRY}/edams-${SERVICE_NAME}:latest .
        docker push ${DOCKER_REGISTRY}/edams-${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
        docker push ${DOCKER_REGISTRY}/edams-${SERVICE_NAME}:latest
      else
        echo "JAR file not found for ${SERVICE_NAME}"
      fi
  only:
    changes:
      - microservices/edams-parent/**/*
      - services/**/*
  when: manual

package:frontend-image:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${DOCKER_REGISTRY} || echo "Docker login completed"
  script:
    - cd edams-web
    - if [ -d dist ]; then
        docker build -f Dockerfile.frontend -t ${DOCKER_REGISTRY}/edams-frontend:${CI_COMMIT_SHORT_SHA} -t ${DOCKER_REGISTRY}/edams-frontend:latest .
        docker push ${DOCKER_REGISTRY}/edams-frontend:${CI_COMMIT_SHORT_SHA}
        docker push ${DOCKER_REGISTRY}/edams-frontend:latest
      else
        echo "Frontend dist not found"
      fi
  only:
    changes:
      - edams-web/**/*
  when: manual

# =====================================================
# 部署阶段
# =====================================================

deploy:test:
  stage: deploy:test
  image: bitnami/kubectl:latest
  environment:
    name: test
    url: https://edams-test.example.com
    on_stop: rollback:test
  before_script:
    - kubectl config use-context test-cluster
  script:
    - |
      echo "Deploying to test environment..."
      # 更新Helm值
      helm upgrade --install edams ./charts/edams \
        --namespace edams-test \
        --create-namespace \
        --set image.tag=${CI_COMMIT_SHORT_SHA} \
        --set image.repository=${DOCKER_REGISTRY}/edams \
        --set frontend.image.tag=${CI_COMMIT_SHORT_SHA} \
        --set frontend.image.repository=${DOCKER_REGISTRY}/edams-frontend \
        --wait --timeout 10m
      # 执行健康检查
      kubectl rollout status deployment/edams-gateway -n edams-test
      kubectl get pods -n edams-test
  only:
    changes:
      - microservices/edams-parent/**/*
      - services/**/*
      - edams-web/**/*
      - charts/**/*
  when: manual

rollback:test:
  stage: deploy:test
  image: bitnami/kubectl:latest
  environment:
    name: test
    action: stop
  script:
    - kubectl config use-context test-cluster
    - helm rollback edams -n edams-test
  only:
    - main
  when: manual

deploy:staging:
  stage: deploy:staging
  image: bitnami/kubectl:latest
  environment:
    name: staging
    url: https://edams-staging.example.com
    on_stop: rollback:staging
  before_script:
    - kubectl config use-context staging-cluster
  script:
    - |
      echo "Deploying to staging environment..."
      helm upgrade --install edams ./charts/edams \
        --namespace edams-staging \
        --create-namespace \
        --set image.tag=${CI_COMMIT_SHORT_SHA} \
        --set image.repository=${DOCKER_REGISTRY}/edams \
        --set frontend.image.tag=${CI_COMMIT_SHORT_SHA} \
        --set frontend.image.repository=${DOCKER_REGISTRY}/edams-frontend \
        --values ./charts/edams/values-staging.yaml \
        --wait --timeout 15m
      kubectl rollout status deployment/edams-gateway -n edams-staging
  only:
    - main
  when: manual

rollback:staging:
  stage: deploy:staging
  image: bitnami/kubectl:latest
  environment:
    name: staging
    action: stop
  script:
    - kubectl config use-context staging-cluster
    - helm rollback edams -n edams-staging
  only:
    - main
  when: manual

deploy:prod:
  stage: deploy:prod
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://edams.example.com
    on_stop: rollback:prod
  before_script:
    - kubectl config use-context prod-cluster
  script:
    - |
      echo "Deploying to production environment..."
      # 蓝绿部署准备
      kubectl get namespaces | grep edams-prod || kubectl create namespace edams-prod
      helm upgrade --install edams ./charts/edams \
        --namespace edams-prod \
        --create-namespace \
        --set image.tag=${CI_COMMIT_SHORT_SHA} \
        --set image.repository=${DOCKER_REGISTRY}/edams \
        --set frontend.image.tag=${CI_COMMIT_SHORT_SHA} \
        --set frontend.image.repository=${DOCKER_REGISTRY}/edams-frontend \
        --values ./charts/edams/values-prod.yaml \
        --wait --timeout 20m
      # 灰度验证
      kubectl rollout status deployment/edams-gateway -n edams-prod
      # 发送通知
      curl -X POST "https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{"msgtype":"text","text":{"content":"EDAMS生产环境部署完成: '${CI_COMMIT_SHORT_SHA}'"}}'
  only:
    - main
  when: manual
  delay: 0

rollback:prod:
  stage: deploy:prod
  image: bitnami/kubectl:latest
  environment:
    name: production
    action: stop
  script:
    - kubectl config use-context prod-cluster
    - helm rollback edams -n edams-prod
  only:
    - main
  when: manual

# =====================================================
# 通知阶段
# =====================================================

notify:success:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      echo "Pipeline completed successfully!"
      if [ -n "${DINGTALK_TOKEN}" ]; then
        curl -X POST "https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_TOKEN}" \
          -H "Content-Type: application/json" \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "EDAMS CI/CD Pipeline",
              "text": "## 构建成功 ✅\n\n- **项目**: EDAMS\n- **分支**: '${CI_COMMIT_REF_NAME}'\n- **提交**: '${CI_COMMIT_SHORT_SHA}'\n- **Pipeline**: ['${CI_PIPELINE_URL}'](${CI_PIPELINE_URL})"
            }
          }'
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: always

notify:failure:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      echo "Pipeline failed!"
      if [ -n "${DINGTALK_TOKEN}" ]; then
        curl -X POST "https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_TOKEN}" \
          -H "Content-Type: application/json" \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "EDAMS CI/CD Pipeline Failed",
              "text": "## 构建失败 ❌\n\n- **项目**: EDAMS\n- **分支**: '${CI_COMMIT_REF_NAME}'\n- **提交**: '${CI_COMMIT_SHORT_SHA}'\n- **Pipeline**: ['${CI_PIPELINE_URL}'](${CI_PIPELINE_URL})"
            }
          }'
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_failure
