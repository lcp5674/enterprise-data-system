server:
  port: 8089

spring:
  application:
    name: edams-chatbot

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 8
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # Feign配置
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
      circuitbreaker:
        enabled: true

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.edams.chatbot.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Springdoc OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.enterprise.edams: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 智能问答服务配置
chatbot:
  # LLM服务配置
  llm:
    service-url: ${LLM_SERVICE_URL:http://localhost:8088}
    timeout: 30000
    max-retries: 3
  
  # 知识库配置
  knowledge:
    service-url: ${KNOWLEDGE_SERVICE_URL:http://localhost:8087}
    # 默认图谱ID
    default-graph-id: default_graph
    # 每次检索的文档数
    top-k: 5
    # 相似度阈值
    similarity-threshold: 0.7
  
  # Milvus配置
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection-name: knowledge_base
    dimension: 1536
    metric-type: IP
    index-type: IVF_FLAT
  
  # 对话配置
  conversation:
    # 最大历史消息数
    max-history-size: 20
    # 对话超时时间(分钟)
    timeout: 30
    # 上下文窗口大小
    context-window: 10
  
  # 提示词配置
  prompt:
    system: |
      你是一个企业数据资产管理的智能助手。请根据提供的知识库内容回答用户的问题。
      如果知识库中没有相关内容，请说明无法找到答案。
      请用简洁、专业的方式回答。
    
    context-template: |
      已知信息：
      {context}
      
      请根据以上信息回答用户的问题。
    
    follow-up-template: |
      基于之前的对话，用户可能想了解更多信息：
      
      {suggestions}
