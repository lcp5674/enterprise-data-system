spring:
  application:
    name: watermark-service
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8090

spring.cloud.nacos.discovery.server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
spring.cloud.nacos.discovery.namespace: ${NACOS_NAMESPACE:dev}
spring.cloud.nacos.config.server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
spring.cloud.nacos.config.namespace: ${NACOS_NAMESPACE:dev}

spring.datasource.driver-class-name: org.postgresql.Driver
spring.datasource.url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:edams_watermark}
spring.datasource.username: ${POSTGRES_USERNAME:postgres}
spring.datasource.password: ${POSTGRES_PASSWORD:postgres123}

spring.jpa.database-platform: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: false

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:edams-watermark}
  secure: false

# 水印配置
watermark:
  default-opacity: 0.3
  default-font-size: 12
  default-font-color: "#CCCCCC"
  default-rotation: -30
  enable-screen-watermark: true
  screen-watermark-interval: 300000

management.endpoints.web.exposure.include: health,info,metrics
management.endpoint.health.show-details: always

springdoc.api-docs.enabled: true
springdoc.swagger-ui.enabled: true

logging.level.root: INFO
logging.level.com.enterprise.edams: DEBUG
