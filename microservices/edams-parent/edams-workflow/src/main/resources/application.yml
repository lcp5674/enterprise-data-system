server:
  port: 8086
  servlet:
    context-path: /workflow

spring:
  application:
    name: edams-workflow
  
  # PostgreSQL数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edams_workflow}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: WorkflowHikariCP
  
  # Flowable配置
  flowable:
    database-schema-update: true
    async-executor-activate: true
    history-level: full
    db-history-used: true
    check-process-definitions: true
    
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 5
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  
  # Kafka配置
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all
    consumer:
      group-id: edams-workflow-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate

# Nacos配置中心
spring.cloud.nacos.config:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}
  file-extension: yml
  refresh-enabled: true

# Nacos服务发现
spring.cloud.nacos.discovery:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}

# 工作流配置
workflow:
  # 审批超时配置（小时）
  approval-timeout: 48
  # 提醒间隔（小时）
  reminder-interval: 24
  # 最大提醒次数
  max-reminders: 3
  # 默认流程定义路径
  process-definition-path: classpath:processes/

# JWT配置
jwt:
  secret: ${JWT_SECRET:edams-auth-secret-key-change-in-production-minimum-256-bits}
  issuer: edams-auth

# 开放API配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    com.enterprise.edams: DEBUG
    org.flowable: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
