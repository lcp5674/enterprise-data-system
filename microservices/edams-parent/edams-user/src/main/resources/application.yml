server:
  port: 8082
  servlet:
    context-path: /user

spring:
  application:
    name: edams-user
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edams_user}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1

spring.cloud.nacos.config:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}
  file-extension: yml

spring.cloud.nacos.discovery:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}

jwt:
  secret: ${JWT_SECRET:edams-user-secret-key-change-in-production-minimum-256-bits}
  access-token-expiration: 7200000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.enterprise.edams: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
