# 服务配置
spring:
  application:
    name: edge-iot-service
  profiles:
    active: dev

# 服务器配置
server:
  port: 8086

# Nacos配置
spring.cloud.nacos.discovery.server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
spring.cloud.nacos.discovery.namespace: ${NACOS_NAMESPACE:dev}
spring.cloud.nacos.config.server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
spring.cloud.nacos.config.namespace: ${NACOS_NAMESPACE:dev}

# 数据源配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:edams_edge_iot}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

# JPA配置
spring.jpa:
  database-platform: org.hibernate.dialect.PostgreSQLDialect
  hibernate:
    ddl-auto: update
  show-sql: false
  properties:
    hibernate:
      format_sql: true
      jdbc:
        batch_size: 50
      order_inserts: true
      order_updates: true

# Kafka配置
spring.kafka.bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer:
  group-id: edge-iot-group
  auto-offset-reset: earliest
  key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  enable-auto-commit: false
spring.kafka.producer:
  key-serializer: org.apache.kafka.common.serialization.StringSerializer
  value-serializer: org.apache.kafka.common.serialization.StringSerializer
  acks: all
  retries: 3
spring.kafka.listener:
  ack-mode: manual

# Redis配置
spring.data.redis.host: ${REDIS_HOST:localhost}
spring.data.redis.port: ${REDIS_PORT:6379}
spring.data.redis.password: ${REDIS_PASSWORD:}
spring.data.redis.database: 6
spring.data.redis.timeout: 3000ms
spring.data.redis.lettuce.pool.max-active: 8
spring.data.redis.lettuce.pool.max-idle: 8
spring.data.redis.lettuce.pool.min-idle: 2

# Actuator配置
management.endpoints.web.exposure.include: health,info,metrics,prometheus
management.endpoint.health.show-details: always
management.metrics.tags.application: ${spring.application.name}

# OpenAPI配置
springdoc.api-docs.enabled: true
springdoc.swagger-ui.enabled: true
springdoc.swagger-ui.path: /swagger-ui.html

# 日志配置
logging.level.root: INFO
logging.level.com.enterprise.edams: DEBUG
logging.pattern.console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 边缘设备配置
edge.iot:
  heartbeat-interval: 30000  # 心跳间隔(ms)
  data-sync-interval: 60000   # 数据同步间隔(ms)
  offline-threshold: 180000   # 离线阈值(ms)
  max-retry-attempts: 3       # 最大重试次数
