server:
  port: 8081
  servlet:
    context-path: /auth

spring:
  application:
    name: edams-auth
  
  # PostgreSQL数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edams_auth}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: AuthHikariCP
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
    open-in-view: false
  
  # Flyway配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  
  # Mail配置
  mail:
    host: ${MAIL_HOST:smtp.company.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@company.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000
          connectiontimeout: 5000

# Nacos配置中心
spring.cloud.nacos.config:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}
  file-extension: yml
  refresh-enabled: true

# Nacos服务发现
spring.cloud.nacos.discovery:
  server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${NACOS_GROUP:EDAMS_GROUP}

# JWT配置
jwt:
  secret: ${JWT_SECRET:edams-auth-secret-key-change-in-production-minimum-256-bits}
  access-token-expiration: 7200000  # 2小时
  refresh-token-expiration: 604800000  # 7天
  issuer: edams-auth

# 登录安全配置
security:
  login:
    max-fail-count: 5  # 最大失败次数
    lock-duration: 1800  # 锁定时长(秒)
    captcha-enabled: true  # 是否启用验证码

# MFA配置
mfa:
  issuer: EDAMS
  algorithm: SHA1
  period: 30
  digits: 6

# 短信配置(可选)
sms:
  enabled: ${SMS_ENABLED:false}
  provider: aliyun
  access-key: ${SMS_ACCESS_KEY:}
  secret-key: ${SMS_SECRET_KEY:}
  sign-name: ${SMS_SIGN_NAME:EDAMS}
  template-codes:
    login: ${SMS_TEMPLATE_LOGIN:}

# 开放API配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    com.enterprise.edams: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
