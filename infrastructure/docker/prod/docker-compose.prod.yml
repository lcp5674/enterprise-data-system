# =====================================================
# EDAMS - 生产环境Docker Compose配置
# 企业数据资产管理系统 - 高可用生产部署
# =====================================================

version: '3.8'

# 网络配置
networks:
  edams-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
  monitoring:
    driver: bridge
  data-network:
    driver: bridge

# 共享卷配置
volumes:
  # 数据库存储
  mysql_data:
    driver: local
  mysql_backup:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  es_data:
    driver: local
  es_logs:
    driver: local
  redis_data:
    driver: local
  
  # 应用数据
  minio_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  
  # 监控数据
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  
  # 日志数据
  logstash_data:
    driver: local
  filebeat_data:
    driver: local

# 服务配置
services:
  # ==================== 负载均衡层 ====================
  
  nginx-loadbalancer:
    image: nginx:1.24-alpine
    container_name: edams-nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    networks:
      - edams-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ==================== 服务注册与发现 ====================

  nacos-cluster:
    image: nacos/nacos-server:v2.2.3
    container_name: edams-nacos-master
    restart: unless-stopped
    environment:
      - MODE=cluster
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql-master
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_USER=nacos
      - MYSQL_SERVICE_PASSWORD=nacos_secure_password_2026
      - NACOS_SERVERS=nacos-node1:8848 nacos-node2:8848 nacos-node3:8848
      - NACOS_APPLICATION_PORT=8848
      - JVM_XMS=2g
      - JVM_XMX=2g
      - JVM_XMN=1g
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=Secure_Nacos_Token_2026
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=edams-nacos-server
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9555:9555"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/conf:/home/nacos/conf
    networks:
      - edams-network
      - data-network
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    command: >
      sh -c "
      echo 'Nacos集群模式启动...' &&
      /home/nacos/bin/startup.sh -m cluster"

  # ==================== 数据库集群 ====================

  mysql-master:
    image: mysql:8.0.35
    container_name: edams-mysql-master
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_secure_password_2026
      - MYSQL_DATABASE=edams
      - MYSQL_USER=edams_user
      - MYSQL_PASSWORD=edams_secure_password_2026
      - TZ=Asia/Shanghai
      - MYSQL_INNODB_BUFFER_POOL_SIZE=2G
      - MYSQL_INNODB_LOG_FILE_SIZE=256M
      - MYSQL_INNODB_LOG_BUFFER_SIZE=32M
      - MYSQL_MAX_CONNECTIONS=500
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_backup:/backup
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/logs:/var/log/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --innodb_buffer_pool_size=2G
      - --innodb_log_file_size=256M
      - --transaction-isolation=READ-COMMITTED
      - --binlog_format=ROW
      - --log-bin=mysql-bin
      - --server-id=1
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  mysql-slave:
    image: mysql:8.0.35
    container_name: edams-mysql-slave
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_secure_password_2026
      - TZ=Asia/Shanghai
      - MYSQL_MASTER_HOST=mysql-master
      - MYSQL_MASTER_PORT=3306
      - MYSQL_MASTER_USER=replica
      - MYSQL_MASTER_PASSWORD=replica_secure_password_2026
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./mysql/slave/conf.d:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=1
    networks:
      - data-network
    depends_on:
      mysql-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ==================== 缓存集群 ====================

  redis-sentinel:
    image: redis:7.2-alpine
    container_name: edams-redis-sentinel
    restart: unless-stopped
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf:ro
      - redis_sentinel_data:/data
    ports:
      - "26379:26379"
    networks:
      - data-network
    environment:
      - REDIS_PASSWORD=redis_secure_password_2026
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis-master:
    image: redis:7.2-alpine
    container_name: edams-redis-master
    restart: unless-stopped
    command: redis-server --requirepass redis_secure_password_2026 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - data-network
    environment:
      - REDIS_PASSWORD=redis_secure_password_2026
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis-replica:
    image: redis:7.2-alpine
    container_name: edams-redis-replica
    restart: unless-stopped
    command: >
      sh -c "
      sleep 10 &&
      redis-server --requirepass redis_secure_password_2026 --appendonly yes --replicaof redis-master 6379 --masterauth redis_secure_password_2026"
    volumes:
      - redis_replica_data:/data
    networks:
      - data-network
    environment:
      - REDIS_PASSWORD=redis_secure_password_2026
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ==================== 消息队列集群 ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: edams-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: zookeeper:2888:3888
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  kafka-broker-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edams-kafka-1
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    ports:
      - "9093:9093"
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  kafka-broker-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edams-kafka-2
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "9094:9094"
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  kafka-broker-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edams-kafka-3
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:9092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "9095:9095"
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: edams-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: edams-production
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      KAFKA_CLUSTERS_0_READONLY: "false"
    networks:
      - data-network
    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== 搜索与分析集群 ====================

  elasticsearch-master:
    image: elasticsearch:8.12.0
    container_name: edams-es-master
    restart: unless-stopped
    environment:
      - node.name=es-master
      - cluster.name=edams-es-cluster
      - discovery.seed_hosts=es-node-1,es-node-2,es-node-3
      - cluster.initial_master_nodes=es-master,es-node-1,es-node-2
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data_master:/usr/share/elasticsearch/data
      - ./elasticsearch/logs:/usr/share/elasticsearch/logs
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  elasticsearch-node-1:
    image: elasticsearch:8.12.0
    container_name: edams-es-node-1
    restart: unless-stopped
    environment:
      - node.name=es-node-1
      - cluster.name=edams-es-cluster
      - discovery.seed_hosts=es-master,es-node-2,es-node-3
      - cluster.initial_master_nodes=es-master,es-node-1,es-node-2
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data_node1:/usr/share/elasticsearch/data
    networks:
      - data-network
    depends_on:
      - elasticsearch-master
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  elasticsearch-node-2:
    image: elasticsearch:8.12.0
    container_name: edams-es-node-2
    restart: unless-stopped
    environment:
      - node.name=es-node-2
      - cluster.name=edams-es-cluster
      - discovery.seed_hosts=es-master,es-node-1,es-node-3
      - cluster.initial_master_nodes=es-master,es-node-1,es-node-2
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data_node2:/usr/share/elasticsearch/data
    networks:
      - data-network
    depends_on:
      - elasticsearch-master
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  kibana:
    image: kibana:8.12.0
    container_name: edams-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch-master:9200
      SERVER_NAME: kibana.edams.local
      SERVER_HOST: "0"
      XPACK_SECURITY_ENABLED: false
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - data-network
    depends_on:
      elasticsearch-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ==================== 图数据库集群 ====================

  neo4j-core-1:
    image: neo4j:5.15-enterprise
    container_name: edams-neo4j-core-1
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_secure_password_2026
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 4G
      NEO4J_server_memory_heap_max__size: 8G
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_dbms_mode: CORE
      NEO4J_server_discovery__type: MULTI
      NEO4J_server_cluster_advertised__address: neo4j-core-1:7687
      NEO4J_server_cluster_raft_advertised__address: neo4j-core-1:7688
      NEO4J_server_cluster_discovery__type: DNS
      NEO4J_server_cluster_discovery_dns_names: neo4j-core-1,neo4j-core-2,neo4j-core-3
      NEO4J_server_cluster_initial__members: neo4j-core-1:7688,neo4j-core-2:7688,neo4j-core-3:7688
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
    ports:
      - "7474:7474"   # HTTP
      - "7473:7473"   # HTTPS
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data_core1:/data
      - neo4j_logs_core1:/logs
      - neo4j_plugins_core1:/plugins
      - ./neo4j/conf:/conf:ro
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_secure_password_2026", "RETURN 1"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G

  neo4j-core-2:
    image: neo4j:5.15-enterprise
    container_name: edams-neo4j-core-2
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_secure_password_2026
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 4G
      NEO4J_server_memory_heap_max__size: 8G
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_dbms_mode: CORE
      NEO4J_server_cluster_advertised__address: neo4j-core-2:7687
      NEO4J_server_cluster_raft_advertised__address: neo4j-core-2:7688
      NEO4J_server_cluster_discovery__type: DNS
    volumes:
      - neo4j_data_core2:/data
      - neo4j_logs_core2:/logs
      - neo4j_plugins_core2:/plugins
    networks:
      - data-network
    depends_on:
      - neo4j-core-1
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G

  neo4j-core-3:
    image: neo4j:5.15-enterprise
    container_name: edams-neo4j-core-3
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_secure_password_2026
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 4G
      NEO4J_server_memory_heap_max__size: 8G
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_dbms_mode: CORE
      NEO4J_server_cluster_advertised__address: neo4j-core-3:7687
      NEO4J_server_cluster_raft_advertised__address: neo4j-core-3:7688
      NEO4J_server_cluster_discovery__type: DNS
    volumes:
      - neo4j_data_core3:/data
      - neo4j_logs_core3:/logs
      - neo4j_plugins_core3:/plugins
    networks:
      - data-network
    depends_on:
      - neo4j-core-1
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G

  # ==================== 对象存储 ====================

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: edams-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secure_password_2026
      MINIO_REGION: cn-east-1
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"   # API端口
      - "9001:9001"   # 控制台端口
    volumes:
      - minio_data:/data
      - ./minio/config:/root/.minio
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ==================== 监控系统 ====================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: edams-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  grafana:
    image: grafana/grafana:10.2.0
    container_name: edams-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grafana_secure_password_2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_DATABASE_TYPE=sqlite3
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # =====================================================
  # 微服务应用部署 (使用自定义镜像)
  # =====================================================

  edams-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/optimized/Dockerfile
      args:
        SERVICE_NAME: gateway
        BUILD_PROFILE: prod
    image: registry.enterprise.com/edams/edams-gateway:1.0.0
    container_name: edams-gateway-prod
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos-cluster:8848
      - JAVA_OPTS=-Xms1g -Xmx2g -XX:+UseG1GC
    ports:
      - "8888:8888"
    volumes:
      - ./logs/gateway:/app/logs
      - ./config/gateway:/app/config
    networks:
      - edams-network
    depends_on:
      nacos-cluster:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
      replicas: 3

  edams-auth:
    build:
      context: ../..
      dockerfile: infrastructure/docker/optimized/Dockerfile
      args:
        SERVICE_NAME: auth
        BUILD_PROFILE: prod
    image: registry.enterprise.com/edams/edams-auth:1.0.0
    container_name: edams-auth-prod
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos-cluster:8848
      - DB_HOST=mysql-master
      - DB_PORT=3306
      - DB_NAME=edams_auth
      - REDIS_HOST=redis-master
      - JAVA_OPTS=-Xms2g -Xmx4g -XX:+UseG1GC
    ports:
      - "8081:8081"
    volumes:
      - ./logs/auth:/app/logs
      - ./config/auth:/app/config
    networks:
      - edams-network
    depends_on:
      nacos-cluster:
        condition: service_healthy
      mysql-master:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
      replicas: 3

  # 更多微服务配置可以按照相同模式添加...

  # ==================== 日志收集 ====================

  filebeat:
    image: elastic/filebeat:8.12.0
    container_name: edams-filebeat
    restart: unless-stopped
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - monitoring
    depends_on:
      elasticsearch-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== 备份服务 ====================

  backup-manager:
    image: alpine:3.18
    container_name: edams-backup-manager
    restart: unless-stopped
    volumes:
      - ./backup/scripts:/scripts
      - mysql_backup:/backup/mysql
      - es_backup:/backup/elasticsearch
      - neo4j_backup:/backup/neo4j
    networks:
      - data-network
    command: >
      sh -c "
      echo '备份管理器启动...' &&
      chmod +x /scripts/*.sh &&
      crond -f"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== 健康检查汇总 ====================

  health-check:
    image: alpine:3.18
    container_name: edams-health-check
    restart: unless-stopped
    volumes:
      - ./healthcheck:/healthcheck
    networks:
      - edams-network
      - data-network
      - monitoring
    command: >
      sh -c "
      echo '健康检查服务启动...' &&
      chmod +x /healthcheck/check.sh &&
      watch -n 60 /healthcheck/check.sh"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M