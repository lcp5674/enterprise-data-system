# =====================================================
# EDAMS - 生产环境 Docker Compose
# 企业数据资产管理系统 - 生产环境 (高可用配置)
# =====================================================

version: '3.8'

name: edams-prod

# 网络配置
networks:
  edams-prod:
    driver: overlay
    attachable: true
    ipam:
      driver: default
      config:
        - subnet: 10.100.0.0/16

# 卷定义 (生产环境建议使用命名卷或外部存储)
volumes:
  pg_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  es_data_prod:
    driver: local
  kafka_data_prod:
    driver: local
  prometheus_data_prod:
    driver: local
  grafana_data_prod:
    driver: local

# 配置定义
configs:
  prometheus-prod-config:
    file: ./monitoring/prometheus/prometheus-prod.yml
  grafana-prod-datasources:
    file: ./monitoring/grafana/datasources-prod.yml
  nginx-prod-config:
    file: ./nginx/nginx-prod.conf

# 服务定义 (生产环境 - 高可用集群配置)
services:
  # ==================== PostgreSQL集群 (主从) ====================

  postgresql-master:
    image: postgres:15-alpine
    container_name: edams-postgres-master
    restart: always
    environment:
      POSTGRES_DB: edams_prod
      POSTGRES_USER: edams_admin
      POSTGRES_PASSWORD: ${POSTGRES_MASTER_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGTZ: Asia/Shanghai
      PG_REPLICATION_USER: replicator
      PG_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_master:/var/lib/postgresql/data
      - ./config/postgres/postgresql-master.conf:/var/lib/postgresql/data/postgresql.conf
      - ./config/postgres/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf
    command:
      - postgres
      - -c config_file=/var/lib/postgresql/data/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edams_admin -d edams_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - edams-prod

  postgresql-replica:
    image: postgres:15-alpine
    container_name: edams-postgres-replica
    restart: always
    environment:
      POSTGRES_DB: edams_prod
      POSTGRES_USER: edams_ro
      POSTGRES_PASSWORD: ${POSTGRES_REPLICA_PASSWORD}
      PG_REPLICATION_USER: replicator
      PG_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - pg_data_replica:/var/lib/postgresql/data
      - ./config/postgres/postgresql-replica.conf:/var/lib/postgresql/data/postgresql.conf
      - ./config/postgres/recovery.conf:/var/lib/postgresql/data/recovery.conf
    depends_on:
      - postgresql-master
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edams_ro -d edams_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.labels.db == replica
    networks:
      - edams-prod

  # ==================== Redis哨兵集群 ====================

  redis-master:
    image: redis:7.2-alpine
    container_name: edams-redis-master
    restart: always
    command:
      - redis-server
      - --requirepass ${REDIS_MASTER_PASSWORD}
      - --appendonly yes
      - --masterauth ${REDIS_MASTER_PASSWORD}
      - --maxmemory 2gb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_master:/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_MASTER_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      edams-prod:
        aliases:
          - redis-master

  redis-replica:
    image: redis:7.2-alpine
    container_name: edams-redis-replica
    restart: always
    command:
      - redis-server
      - --requirepass ${REDIS_REPLICA_PASSWORD}
      - --appendonly yes
      - --masterauth ${REDIS_MASTER_PASSWORD}
      - --replicaof redis-master 6379
    volumes:
      - redis_data_replica:/data
    depends_on:
      - redis-master
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.labels.cache == replica
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_REPLICA_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edams-prod

  redis-sentinel:
    image: redis:7.2-alpine
    container_name: edams-redis-sentinel
    restart: always
    command:
      - redis-sentinel
      - /etc/redis/sentinel.conf
    volumes:
      - ./config/redis/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-replica
    deploy:
      mode: replicated
      replicas: 3
    networks:
      - edams-prod

  # ==================== Elasticsearch集群 ====================

  elasticsearch-master:
    image: elasticsearch:8.11.0
    container_name: edams-es-master
    restart: always
    environment:
      - cluster.name=edams-prod-cluster
      - node.name=master
      - node.master=true
      - node.data=false
      - discovery.seed_hosts=elasticsearch-master,elasticsearch-node-1,elasticsearch-node-2
      - cluster.initial_master_nodes=master,node-1,node-2
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
    volumes:
      - es_data_master:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edams-prod

  elasticsearch-node-1:
    image: elasticsearch:8.11.0
    container_name: edams-es-node-1
    restart: always
    environment:
      - cluster.name=edams-prod-cluster
      - node.name=node-1
      - node.master=true
      - node.data=true
      - discovery.seed_hosts=elasticsearch-master,elasticsearch-node-1,elasticsearch-node-2
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
    volumes:
      - es_data_node1:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -u elastic:${ELASTIC_PASSWORD} -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edams-prod

  elasticsearch-node-2:
    image: elasticsearch:8.11.0
    container_name: edams-es-node-2
    restart: always
    environment:
      - cluster.name=edams-prod-cluster
      - node.name=node-2
      - node.master=true
      - node.data=true
      - discovery.seed_hosts=elasticsearch-master,elasticsearch-node-1,elasticsearch-node-2
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
    volumes:
      - es_data_node2:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -u elastic:${ELASTIC_PASSWORD} -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edams-prod

  # ==================== Kafka集群 ====================

  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: edams-kafka-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 5
    volumes:
      - zookeeper_persistent_data:/var/lib/zookeeper/data
      - zookeeper_persistent_log:/var/lib/zookeeper/log
    deploy:
      mode: replicated
      replicas: 3
    networks:
      - edams-prod

  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edams-kafka-broker
    restart: always
    depends_on:
      - kafka-zookeeper
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST}:${KAFKA_ADVERTISED_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_COMPRESSION_TYPE: gzip
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
    volumes:
      - kafka_persistent_data:/var/lib/kafka/data
    deploy:
      mode: replicated
      replicas: 3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edams-prod

  # ==================== Nacos集群 ====================

  nacos-server:
    image: nacos/nacos-server:v2.3.0
    container_name: edams-nacos-server
    restart: always
    environment:
      MODE: cluster
      NACOS_SERVERS: nginx:8848
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: ${MYSQL_HOST}
      MYSQL_SERVICE_PORT: ${MYSQL_PORT}
      MYSQL_SERVICE_DB_NAME: ${MYSQL_DATABASE}
      MYSQL_SERVICE_USER: ${MYSQL_USER}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD}
      JVM_XMS: 2g
      JVM_XMX: 2g
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
    deploy:
      mode: replicated
      replicas: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - edams-prod

  # ==================== 监控集群 ====================

  prometheus-prod:
    image: prom/prometheus:v2.47.0
    container_name: edams-prometheus-prod
    restart: always
    configs:
      - source: prometheus-prod-config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data_prod:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.external-url=${PROMETHEUS_EXTERNAL_URL}"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=100GB"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    networks:
      - edams-prod

  grafana-prod:
    image: grafana/grafana:10.2.0
    container_name: edams-grafana-prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_URL}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel"
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgresql-master:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
    configs:
      - source: grafana-prod-datasources
        target: /etc/grafana/provisioning/datasources/datasource.yml
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    depends_on:
      - prometheus-prod
      - postgresql-master
    networks:
      - edams-prod

  # ==================== 反向代理 (生产) ====================

  nginx-prod:
    image: nginx:alpine
    container_name: edams-nginx-prod
    restart: always
    configs:
      - source: nginx-prod-config
        target: /etc/nginx/nginx.conf
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/static:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
    networks:
      - edams-prod

  # ==================== 应用服务 (生产) ====================

  edams-gateway-prod:
    image: ${REGISTRY}/edams-gateway:${TAG}
    container_name: edams-gateway-prod
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod,docker
      - SERVER_PORT=8888
      - NACOS_SERVER_ADDR=nacos-server:8848
      - NACOS_NAMESPACE=prod
      - NACOS_USERNAME=${NACOS_USERNAME}
      - NACOS_PASSWORD=${NACOS_PASSWORD}
      - JAVA_OPTS=-Xms1g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      - SPRING_REDIS_CLUSTER_NODES=redis-master:6379,redis-replica:6379
      - SPRING_REDIS_PASSWORD=${REDIS_MASTER_PASSWORD}
    ports:
      - "8888:8888"
    depends_on:
      - nacos-server
      - redis-master
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - edams-prod

  edams-auth-prod:
    image: ${REGISTRY}/edams-auth:${TAG}
    container_name: edams-auth-prod
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod,docker
      - SERVER_PORT=8081
      - NACOS_SERVER_ADDR=nacos-server:8848
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql-master:5432/edams_prod
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_REDIS_CLUSTER_NODES=redis-master:6379,redis-replica:6379
      - SPRING_REDIS_PASSWORD=${REDIS_MASTER_PASSWORD}
    depends_on:
      - postgresql-master
      - redis-master
      - nacos-server
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edams-prod

  # ==================== 备份服务 ====================

  backup-prod:
    image: alpine:latest
    container_name: edams-backup-prod
    restart: "no"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    volumes:
      - ./scripts/backup:/scripts
      - pg_data_master:/pg_data:ro
      - redis_data_master:/redis_data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting backup..."
        /scripts/backup.sh
        echo "Backup completed."
    deploy:
      mode: global
      placement:
        constraints:
          - node.labels.backup == true
    networks:
      - edams-prod