# EDAMS生产环境K8s Secrets配置
# ⚠️ 重要：请在部署前替换以下占位符为实际值！
# 
# 使用方式：
# 1. 创建命名空间
#    kubectl create namespace edams
#
# 2. 应用Secrets
#    kubectl apply -f edams-secrets.yaml
#
# 3. 验证Secrets已创建
#    kubectl get secrets -n edams
#
# 4. 在Deployment中引用
#    envFrom:
#      - secretRef:
#          name: edams-secrets

---
apiVersion: v1
kind: Namespace
metadata:
  name: edams
  labels:
    app: edams
    environment: production

---
# 认证相关Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edams-auth-secrets
  namespace: edams
  labels:
    app: edams-auth
    type: Opaque
type: Opaque
data:
  # JWT签名密钥 (必须256位以上)
  # 生成方式: echo -n "your-secure-jwt-secret-key-256bits" | base64
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET>
  
  # MFA TOTP密钥盐值
  MFA_SECRET_SALT: <BASE64_ENCODED_MFA_SALT>

---
# 数据库Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edams-db-secrets
  namespace: edams
  labels:
    app: edams
    type: Opaque
type: Opaque
data:
  # MySQL数据库密码
  DB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  
  # Redis密码
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>
  
  # Neo4j密码
  NEO4J_PASSWORD: <BASE64_ENCODED_NEO4J_PASSWORD>

---
# 第三方服务集成Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edams-integration-secrets
  namespace: edams
  labels:
    app: edams
    type: Opaque
type: Opaque
data:
  # 企业微信Webhook密钥
  WXWORK_WEBHOOK_KEY: <BASE64_ENCODED_WXWORK_KEY>
  
  # 钉钉Webhook密钥
  DINGTALK_WEBHOOK_SECRET: <BASE64_ENCODED_DINGTALK_SECRET>
  
  # 飞书Webhook密钥
  FEISHU_WEBHOOK_SECRET: <BASE64_ENCODED_FEISHU_SECRET>
  
  # 阿里云短信AccessKey
  ALIYUN_SMS_ACCESS_KEY: <BASE64_ENCODED_ALIYUN_AK>
  ALIYUN_SMS_ACCESS_SECRET: <BASE64_ENCODED_ALIYUN_SK>

---
# LLM大模型API Keys
apiVersion: v1
kind: Secret
metadata:
  name: edams-llm-secrets
  namespace: edams
  labels:
    app: edams-llm
    type: Opaque
type: Opaque
data:
  # OpenAI API Key
  OPENAI_API_KEY: <BASE64_ENCODED_OPENAI_KEY>
  
  # 阿里云百炼API Key
  ALIYUN_BAILIAN_API_KEY: <BASE64_ENCODED_ALIYUN_BAILIAN_KEY>
  
  # 智谱AI API Key
  ZHIPU_API_KEY: <BASE64_ENCODED_ZHIPU_KEY>

---
# 邮件服务Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edams-mail-secrets
  namespace: edams
  labels:
    app: edams
    type: Opaque
type: Opaque
data:
  # SMTP用户名
  MAIL_USERNAME: <BASE64_ENCODED_MAIL_USER>
  
  # SMTP密码/授权码
  MAIL_PASSWORD: <BASE64_ENCODED_MAIL_PASSWORD>

---
# 使用说明
# 
# 生成Base64编码的值：
#   echo -n "your-actual-value" | base64
#
# 示例 - 生成JWT_SECRET:
#   1. 生成一个安全的随机密钥 (至少256位):
#      openssl rand -base64 32
#   
#   2. 编码:
#      echo -n "生成的密钥" | base64
#
#   3. 替换 <BASE64_ENCODED_XXX> 为编码后的值
#
# 安全建议:
# 1. 生产环境请使用真实的强密码，不要使用示例值
# 2. 定期轮换密钥
# 3. 限制Secret访问权限
# 4. 启用Kubernetes审计日志
