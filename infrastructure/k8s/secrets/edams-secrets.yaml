# EDAMS Kubernetes Secrets 模板
# 使用前请替换所有占位符
# 命名: edams-secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: edams-secrets
  namespace: edams
  labels:
    app: edams
    version: v1.0.0
type: Opaque
stringData:
  # 数据库凭证
  DB_HOST: "postgres.edams-db.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "edams_prod"
  DB_USERNAME: "edams_user"
  DB_PASSWORD: "<REPLACE_WITH_SECURE_PASSWORD>"

  # JWT 密钥 (最少256位)
  JWT_SECRET: "<REPLACE_WITH_64BYTE_RANDOM_STRING>"

  # 数据源加密密钥 (AES-256 = 32字节Base64)
  DATASOURCE_ENCRYPTION_KEY: "<REPLACE_WITH_32BYTE_BASE64_KEY>"

  # Redis 凭证
  REDIS_HOST: "redis.edams-cache.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "<REPLACE_WITH_REDIS_PASSWORD>"

  # Kafka 连接凭证
  KAFKA_BOOTSTRAP_SERVERS: "kafka.edams-messaging.svc.cluster.local:9092"
  KAFKA_USERNAME: "edams_kafka"
  KAFKA_PASSWORD: "<REPLACE_WITH_KAFKA_PASSWORD>"

  # SSO / Keycloak
  KEYCLOAK_CLIENT_SECRET: "<REPLACE_WITH_KEYCLOAK_SECRET>"

  # Milvus 向量数据库
  MILVUS_HOST: "milvus.edams-ai.svc.cluster.local"
  MILVUS_PORT: "19530"
  MILVUS_USER: "edams"
  MILVUS_PASSWORD: "<REPLACE_WITH_MILVUS_PASSWORD>"

---
# Secret 引用示例（在 Deployment 中使用）
# env:
#   - name: DB_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: edams-secrets
#         key: DB_PASSWORD
