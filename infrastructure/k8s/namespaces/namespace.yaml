# =====================================================
# EDAMS - Kubernetes命名空间配置
# 企业数据资产管理系统命名空间定义
# =====================================================

apiVersion: v1
kind: Namespace
metadata:
  name: edams-prod
  labels:
    name: edams
    environment: production
    team: devops
    project: enterprise-data-asset-management
  annotations:
    description: "Enterprise Data Asset Management System Production Environment"
    owner: "DevOps Team"
    contact: "devops@enterprise.com"
    created-by: "kubernetes-deployment"
---
apiVersion: v1
kind: Namespace
metadata:
  name: edams-staging
  labels:
    name: edams
    environment: staging
    team: devops
  annotations:
    description: "Enterprise Data Asset Management System Staging Environment"
    owner: "QA Team"
---
apiVersion: v1
kind: Namespace
metadata:
  name: edams-dev
  labels:
    name: edams
    environment: development
    team: devops
  annotations:
    description: "Enterprise Data Asset Management System Development Environment"
    owner: "Development Team"
---
apiVersion: v1
kind: Namespace
metadata:
  name: edams-monitoring
  labels:
    name: edams
    component: monitoring
    environment: production
  annotations:
    description: "Monitoring stack for EDAMS"
    prometheus.io/scrape: "true"
    grafana.com/dashboard: "edams-overview"
---
apiVersion: v1
kind: Namespace
metadata:
  name: edams-logging
  labels:
    name: edams
    component: logging
    environment: production
  annotations:
    description: "Logging and log aggregation for EDAMS"
    fluentbit.io/parser: "json"
---
apiVersion: v1
kind: Namespace
metadata:
  name: edams-database
  labels:
    name: edams
    component: database
    environment: production
  annotations:
    description: "Database services for EDAMS"
    backup-schedule: "daily"
----
# 资源配额配置
apiVersion: v1
kind: ResourceQuota
metadata:
  name: edams-prod-quota
  namespace: edams-prod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    requests.storage: "100Gi"
    persistentvolumeclaims: "10"
    services.loadbalancers: "5"
    services.nodeports: "10"
    pods: "50"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: edams-dev-quota
  namespace: edams-dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
---
# 限制范围配置
apiVersion: v1
kind: LimitRange
metadata:
  name: edams-prod-limits
  namespace: edams-prod
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "128Mi"
  - type: Pod
    max:
      cpu: "8"
      memory: "16Gi"
---
# 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: edams-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring
  namespace: edams-prod
spec:
  podSelector:
    matchLabels:
      component: application
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: edams
          component: monitoring
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-access
  namespace: edams-prod
spec:
  podSelector:
    matchLabels:
      component: database
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: edams
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 9092