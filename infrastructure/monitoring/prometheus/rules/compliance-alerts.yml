# =====================================================
# EDAMS - 合规监控告警规则
# 企业数据资产管理系统 - 合规相关监控指标和告警
# =====================================================

groups:
  # 数据脱敏合规监控
  - name: data_masking_compliance
    interval: 1m
    rules:
      # 脱敏服务可用性
      - alert: DataMaskingServiceDown
        expr: up{job="edams-compliances",service=~"edams-data-masking.*"} == 0
        for: 5m
        labels:
          severity: critical
          compliance: "gdpr-32"
          region: china
        annotations:
          summary: "数据脱敏服务 {{ $labels.instance }} 不可用"
          description: "数据脱敏服务已宕机超过5分钟，可能导致敏感数据处理不合规"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-masking-service-down"
          compliance_impact: "违反GDPR第32条数据安全处理要求"

      # 脱敏任务失败率过高
      - alert: DataMaskingHighFailureRate
        expr: rate(edams_data_masking_tasks_failed_total[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
          compliance: "gdpr-5,gdpr-32"
          region: china
        annotations:
          summary: "数据脱敏任务失败率过高({{ $value }}%)"
          description: "过去10分钟内，数据脱敏任务失败率超过5%，可能导致数据泄露风险"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-masking-failures"
          compliance_impact: "影响GDPR第5条数据处理原则和第32条安全措施"

      # 敏感数据脱敏规则命中率过低
      - alert: DataMaskingLowCoverage
        expr: sum(rate(edams_sensitive_data_masked_total[1h])) / sum(rate(edams_sensitive_data_detected_total[1h])) < 0.95
        for: 1h
        labels:
          severity: warning
          compliance: "gdpr-25,pii-protection"
          region: china
        annotations:
          summary: "敏感数据脱敏覆盖率低于95%"
          description: "敏感数据脱敏规则覆盖率不足，可能导致个人识别信息(PII)泄露"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-masking-coverage"
          compliance_impact: "违反GDPR第25条数据保护设计和默认要求"

      # 数据加密状态异常
      - alert: DataEncryptionDisabled
        expr: edams_data_encryption_enabled == 0
        for: 0m
        labels:
          severity: critical
          compliance: "gdpr-32,pci-dss-3.4"
          region: china
        annotations:
          summary: "数据加密被禁用"
          description: "关键数据加密功能被禁用，存在数据泄露风险"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-encryption-disabled"
          compliance_impact: "违反GDPR第32条和PCI DSS 3.4标准"

  # 合规报告服务监控
  - name: compliance_reporting
    interval: 1m
    rules:
      # 合规报告生成失败
      - alert: ComplianceReportGenerationFailed
        expr: increase(edams_compliance_report_generation_failed_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          compliance: "gdpr-30,soc2"
          region: china
        annotations:
          summary: "合规报告生成失败"
          description: "合规报告生成失败次数：{{ $value }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/compliance-report-failure"
          compliance_impact: "影响GDPR第30条处理活动记录要求"

      # 合规报告延迟
      - alert: ComplianceReportDelay
        expr: edams_compliance_report_scheduled_time - edams_compliance_report_actual_time > 3600
        for: 15m
        labels:
          severity: warning
          compliance: "gdpr-30,internal-audit"
          region: china
        annotations:
          summary: "合规报告生成延迟超过1小时"
          description: "合规报告实际生成时间比计划时间晚 {{ humanize $value }} 秒"
          runbook_url: "https://wiki.enterprise.com/runbooks/compliance-report-delay"
          compliance_impact: "影响内部审计和合规监测"

      # 合规报告完整性检查失败
      - alert: ComplianceReportIntegrityFailure
        expr: edams_compliance_report_integrity_check == 0
        for: 0m
        labels:
          severity: critical
          compliance: "gdpr-5,data-integrity"
          region: china
        annotations:
          summary: "合规报告完整性检查失败"
          description: "合规报告的数据完整性验证失败，可能存在篡改风险"
          runbook_url: "https://wiki.enterprise.com/runbooks/report-integrity-failure"
          compliance_impact: "违反GDPR第5条数据准确性原则"

  # 数据保护与隐私监控
  - name: data_protection_privacy
    interval: 1m
    rules:
      # 数据泄露检测
      - alert: PotentialDataLeakage
        expr: rate(edams_data_leakage_attempts_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
          compliance: "gdpr-33,pdpa-28"
          region: china
        annotations:
          summary: "检测到数据泄露尝试"
          description: "过去5分钟内检测到 {{ $value }} 次数据泄露尝试"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-leakage-attempts"
          compliance_impact: "触发GDPR第33条数据泄露通知义务"

      # 用户数据访问异常
      - alert: AbnormalUserDataAccess
        expr: rate(edams_user_data_access_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          compliance: "gdpr-15,user-rights"
          region: china
        annotations:
          summary: "用户数据访问异常频繁"
          description: "用户数据访问请求频率异常：{{ $value }}/分钟"
          runbook_url: "https://wiki.enterprise.com/runbooks/abnormal-data-access"
          compliance_impact: "影响GDPR第15条数据主体访问权"

      # 数据保留策略违规
      - alert: DataRetentionPolicyViolation
        expr: edams_data_retention_expired_count > 0
        for: 1h
        labels:
          severity: warning
          compliance: "gdpr-17,purpose-limitation"
          region: china
        annotations:
          summary: "数据保留策略违规"
          description: "发现 {{ $value }} 条超过保留期限的数据"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-retention-violation"
          compliance_impact: "违反GDPR第17条擦除权(被遗忘权)"

      # 同意管理异常
      - alert: ConsentManagementFailure
        expr: edams_user_consent_validation_failed_total > 0
        for: 0m
        labels:
          severity: critical
          compliance: "gdpr-7,consent-management"
          region: china
        annotations:
          summary: "用户同意管理验证失败"
          description: "用户同意状态验证失败次数：{{ $value }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/consent-validation-failure"
          compliance_impact: "违反GDPR第7条同意条件"

  # 安全配置合规监控
  - name: security_configuration_compliance
    interval: 5m
    rules:
      # TLS配置不合规
      - alert: TLSConfigurationNonCompliance
        expr: edams_tls_version{version=~"SSL.*|TLS1\\.0|TLS1\\.1"} > 0
        for: 0m
        labels:
          severity: critical
          compliance: "pci-dss-4.1,tls-best-practices"
          region: china
        annotations:
          summary: "使用不安全的TLS版本"
          description: "检测到使用弱TLS版本：{{ $labels.version }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/weak-tls-configuration"
          compliance_impact: "违反PCI DSS 4.1标准和TLS最佳实践"

      # 密码策略违规
      - alert: PasswordPolicyViolation
        expr: edams_password_policy_violations_total > 0
        for: 1h
        labels:
          severity: warning
          compliance: "iso-27001,a-9.4.3"
          region: china
        annotations:
          summary: "密码策略违规"
          description: "检测到 {{ $value }} 次密码策略违规"
          runbook_url: "https://wiki.enterprise.com/runbooks/password-policy-violations"
          compliance_impact: "违反ISO 27001 A.9.4.3密码管理要求"

      # 访问控制配置错误
      - alert: AccessControlMisconfiguration
        expr: edams_access_control_errors_total > 0
        for: 0m
        labels:
          severity: critical
          compliance: "gdpr-32,iso-27001-a-9"
          region: china
        annotations:
          summary: "访问控制配置错误"
          description: "访问控制配置错误次数：{{ $value }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/access-control-errors"
          compliance_impact: "违反GDPR第32条和ISO 27001 A.9访问控制要求"

      # 审计日志配置问题
      - alert: AuditLogConfigurationIssue
        expr: edams_audit_log_disabled == 1 or edams_audit_log_retention_days < 90
        for: 0m
        labels:
          severity: warning
          compliance: "soc2-cc6,iso-27001-a-12.4"
          region: china
        annotations:
          summary: "审计日志配置不合规"
          description: "审计日志被禁用或保留期不足90天"
          runbook_url: "https://wiki.enterprise.com/runbooks/audit-log-configuration"
          compliance_impact: "违反SOC2 CC6和ISO 27001 A.12.4审计要求"

  # 中国特定合规要求
  - name: china_specific_compliance
    interval: 10m
    rules:
      # 数据本地化合规检查
      - alert: DataLocalizationNonCompliance
        expr: edams_data_location{region!="cn"} > 0
        for: 0m
        labels:
          severity: critical
          compliance: "csl,dsl,pip-l"
          region: china
        annotations:
          summary: "数据本地化要求违规"
          description: "检测到数据存储在非中国境内区域：{{ $labels.region }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-localization-violation"
          compliance_impact: "违反《网络安全法》、《数据安全法》、《个人信息保护法》"

      # 网络安全等级保护异常
      - alert: MLPSComplianceIssue
        expr: edams_mlps_compliance_status == 0
        for: 0m
        labels:
          severity: critical
          compliance: "mlps,cs-l-3"
          region: china
        annotations:
          summary: "网络安全等级保护不合规"
          description: "系统不符合《网络安全等级保护条例》要求"
          runbook_url: "https://wiki.enterprise.com/runbooks/mlps-compliance"
          compliance_impact: "违反网络安全等级保护制度"

      # 关键信息基础设施保护
      - alert: CIIPComplianceIssue
        expr: edams_ciip_protection_enabled == 0
        for: 0m
        labels:
          severity: critical
          compliance: "csl-31,ciip"
          region: china
        annotations:
          summary: "关键信息基础设施保护未启用"
          description: "关键信息基础设施保护措施未正确配置"
          runbook_url: "https://wiki.enterprise.com/runbooks/ciip-protection"
          compliance_impact: "违反《网络安全法》第31条关键信息基础设施保护要求"

      # 数据分类分级不符
      - alert: DataClassificationViolation
        expr: edams_data_classification_errors_total > 0
        for: 1h
        labels:
          severity: warning
          compliance: "dsl-21,data-classification"
          region: china
        annotations:
          summary: "数据分类分级违规"
          description: "数据分类分级错误次数：{{ $value }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/data-classification-errors"
          compliance_impact: "违反《数据安全法》第21条数据分类分级要求"

  # 通用合规指标
  - name: compliance_general_metrics
    interval: 1m
    rules:
      # 合规性评分下降
      - alert: ComplianceScoreDrop
        expr: edams_compliance_overall_score < 80
        for: 24h
        labels:
          severity: critical
          compliance: "all-standards"
          region: global
        annotations:
          summary: "合规性总体评分低于80分"
          description: "合规性总体评分：{{ $value }} 分"
          runbook_url: "https://wiki.enterprise.com/runbooks/compliance-score-drop"
          compliance_impact: "系统合规状态不符合预期"

      # 未处理的合规问题
      - alert: UnresolvedComplianceIssuesHigh
        expr: edams_compliance_issues_open_total > 10
        for: 7d
        labels:
          severity: warning
          compliance: "all-standards"
          region: global
        annotations:
          summary: "大量未处理的合规问题"
          description: "开放合规问题数量：{{ $value }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/unresolved-compliance-issues"
          compliance_impact: "可能导致监管处罚"

      # 合规文档过期
      - alert: ComplianceDocumentationExpired
        expr: edams_compliance_document_expired_count > 0
        for: 0m
        labels:
          severity: warning
          compliance: "documentation-requirements"
          region: global
        annotations:
          summary: "合规文档过期"
          description: "发现 {{ $value }} 份过期合规文档"
          runbook_url: "https://wiki.enterprise.com/runbooks/expired-compliance-docs"
          compliance_impact: "影响审计和监管检查"

      # 第三方服务合规状态
      - alert: ThirdPartyComplianceIssue
        expr: edams_third_party_compliance_status{status="non-compliant"} > 0
        for: 0m
        labels:
          severity: warning
          compliance: "vendor-management"
          region: global
        annotations:
          summary: "第三方服务不合规"
          description: "发现不合规的第三方服务：{{ $labels.service }}"
          runbook_url: "https://wiki.enterprise.com/runbooks/third-party-compliance"
          compliance_impact: "供应链合规风险"

  # 记录规则：合成合规指标
  - name: compliance_synthetic_metrics
    interval: 5m
    rules:
      # 数据保护成熟度评分
      - record: edams_data_protection_maturity_score
        expr: |
          0.3 * (100 - (increase(edams_data_masking_tasks_failed_total[24h]) / (increase(edams_data_masking_tasks_total[24h]) + 1) * 100)) +
          0.3 * min(100, edams_data_encryption_coverage * 100) +
          0.2 * (100 - (increase(edams_data_leakage_attempts_total[24h]) / 10)) +
          0.2 * (100 - (increase(edams_access_control_errors_total[24h]) / 5))
        labels:
          metric_type: "synthetic"
          category: "data-protection"

      # 隐私合规率
      - record: edams_privacy_compliance_rate
        expr: |
          (edams_user_consent_valid_total / (edams_user_consent_total + 1)) * 100 *
          (1 - (increase(edams_compliance_report_generation_failed_total[7d]) / (increase(edams_compliance_report_generation_total[7d]) + 1))) *
          (1 - (increase(edams_data_retention_expired_count[7d]) / 1000))
        labels:
          metric_type: "synthetic"
          category: "privacy"

      # 中国合规指数
      - record: edams_china_compliance_index
        expr: |
          (edams_data_location{region="cn"} / (edams_data_location_total + 1)) * 100 *
          (edams_mlps_compliance_status) *
          (edams_ciip_protection_enabled)
        labels:
          metric_type: "synthetic"
          category: "china-compliance"
          region: "china"

      # 总体合规风险评分
      - record: edams_compliance_risk_score
        expr: |
          clamp(
            (100 - edams_data_protection_maturity_score) * 0.4 +
            (100 - edams_privacy_compliance_rate) * 0.3 +
            (100 - edams_china_compliance_index) * 0.3,
            0, 100
          )
        labels:
          metric_type: "synthetic"
          category: "risk-assessment"

      # 合规事件趋势
      - record: edams_compliance_events_trend_7d
        expr: |
          avg_over_time(
            (increase(edams_compliance_issues_total[1d])[0:6d]) 
            / sum(increase(edams_compliance_issues_total[1d])[0:6d]) * 100
          )
        labels:
          metric_type: "trend"
          window: "7d"

      # 合规响应时间P99
      - record: edams_compliance_response_time_p99
        expr: histogram_quantile(0.99, sum by(le) (rate(edams_compliance_response_time_seconds_bucket[1h])))
        labels:
          metric_type: "performance"
          quantile: "0.99"