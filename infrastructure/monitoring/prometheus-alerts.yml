# EDAMS生产环境Prometheus告警规则
# 部署方式：
# 1. 将此文件放入Prometheus配置目录
# 2. 在prometheus.yml中添加:
#    rule_files:
#      - "/etc/prometheus/rules/edams-alerts.yml"
# 3. 重启Prometheus服务

groups:
  # ==================== EDAMS服务告警 ====================
  - name: edams-service-alerts
    interval: 30s
    rules:
    
      # 服务实例宕机
      - alert: ServiceInstanceDown
        expr: up{job="edams-*"} == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.instance }}"
        annotations:
          summary: "服务实例 {{ $labels.instance }} ({{ $labels.job }}) 已宕机"
          description: "服务实例已连续1分钟不可达，请检查容器状态和日志"
          runbook_url: "https://docs.edams.example.com/runbooks/service-down"
      
      # 服务响应超时
      - alert: ServiceResponseTimeout
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{job=~"edams-.*"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} 响应时间过长 (P99 > 5s)"
          description: "当前P99响应时间: {{ $value }}s"
      
      # 服务错误率过高
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_server_requests_seconds_count[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 错误率超过5%"
          description: "当前5xx错误率: {{ $value | humanizePercentage }}"
      
      # 服务请求量异常
      - alert: AbnormalRequestVolume
        expr: |
          sum(rate(http_server_requests_seconds_count[10m])) by (job) 
          > 2 * avg_over_time(sum(rate(http_server_requests_seconds_count[10m])) by (job)[1h:5m])
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} 请求量异常激增"
          description: "当前请求量是过去1小时平均值的2倍以上"

  # ==================== JVM性能告警 ====================
  - name: edams-jvm-alerts
    interval: 30s
    rules:
    
      # JVM堆内存使用率过高
      - alert: JvmHeapUsageHigh
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} JVM堆内存使用率超过85%"
          description: "当前使用: {{ $value | humanizePercentage }}"
          action: "考虑增加堆内存或检查内存泄漏"
      
      # JVM堆内存即将耗尽
      - alert: JvmHeapExhausted
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} JVM堆内存即将耗尽!"
          description: "当前使用: {{ $value | humanizePercentage }}"
          action: "立即检查并处理，可能需要重启服务"
      
      # JVM GC频繁
      - alert: FrequentGC
        expr: rate(jvm_gc_pause_seconds_count[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} GC频率异常"
          description: "每分钟GC次数: {{ $value | humanize }}"
      
      # JVM线程数过多
      - alert: HighJVMThreadCount
        expr: jvm_threads_live_threads > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} 活动线程数过多"
          description: "当前线程数: {{ $value }}"

  # ==================== 数据库连接池告警 ====================
  - name: edams-datasource-alerts
    interval: 30s
    rules:
    
      # HikariCP连接池使用率过高
      - alert: HikariPoolUsageHigh
        expr: |
          hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "服务 {{ $labels.job }} 数据库连接池使用率超过80%"
          description: "活动连接: {{ $value | humanize }}"
          action: "检查慢查询和连接泄漏"
      
      # HikariCP连接池即将耗尽
      - alert: HikariPoolExhausted
        expr: |
          hikaricp_connections_active / hikaricp_connections_max > 0.95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 数据库连接池即将耗尽!"
          description: "活动连接: {{ $value | humanize }}"
          action: "立即处理，可能导致服务不可用"
      
      # 连接获取超时
      - alert: HikariConnectionTimeout
        expr: hikaricp_connections_timeout_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 数据库连接获取超时"
          description: "连接等待超时次数: {{ $value }}"
      
      # 连接池空闲超时
      - alert: HikariConnectionIdleTimeout
        expr: hikaricp_connections_idle > hikaricp_connections_max * 0.9
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "服务 {{ $labels.job }} 存在大量空闲连接"
          description: "空闲连接数: {{ $value }}"

  # ==================== Redis告警 ====================
  - name: edams-redis-alerts
    interval: 30s
    rules:
    
      # Redis连接数过多
      - alert: RedisConnectedClientsHigh
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis连接数过高"
          description: "当前连接数: {{ $value }}"
      
      # Redis内存使用率
      - alert: RedisMemoryUsageHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis内存使用率超过80%"
          description: "当前使用: {{ $value | humanizePercentage }}"
      
      # Redis拒绝连接
      - alert: RedisConnectionRefused
        expr: increase(redis_rejected_connections_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis拒绝新连接!"
          description: "被拒绝的连接数: {{ $value }}"

  # ==================== 业务指标告警 ====================
  - name: edams-business-alerts
    interval: 60s
    rules:
    
      # 认证失败率过高
      - alert: HighAuthFailureRate
        expr: |
          (
            sum(rate(edams_auth_failures_total[5m])) by (job)
            /
            sum(rate(edams_auth_total[5m])) by (job)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "认证失败率超过10%"
          description: "可能存在暴力破解攻击"
      
      # 令牌刷新失败
      - alert: TokenRefreshFailure
        expr: rate(edams_token_refresh_failures_total[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "令牌刷新失败率异常"
          description: "用户可能需要重新登录"
      
      # 资产变更频繁
      - alert: HighAssetChangeRate
        expr: rate(edams_asset_changes_total[5m]) > 100
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "资产变更频率较高"
          description: "过去5分钟变更数: {{ $value | humanize }}/s"
      
      # 工作流任务积压
      - alert: WorkflowTaskBacklog
        expr: edams_workflow_pending_tasks > 1000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "工作流任务积压"
          description: "待处理任务数: {{ $value }}"

  # ==================== Kafka告警 ====================
  - name: edams-kafka-alerts
    interval: 30s
    rules:
    
      # Kafka消费者Lag过大
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_lag_sum > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka消费滞后严重"
          description: "消费者lag: {{ $value }}"
          action: "考虑增加消费者实例或优化消费逻辑"
      
      # Kafka主题消息堆积
      - alert: KafkaTopicBacklog
        expr: kafka_topic_partition_newest_offset - kafka_topic_partition_current_offset > 50000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Kafka主题 {{ $labels.topic }} 消息堆积"
          description: "堆积消息数: {{ $value }}"

  # ==================== SLA告警 ====================
  - name: edams-sla-alerts
    interval: 60s
    rules:
    
      # 服务可用性低于SLO
      - alert: SLOAvailabilityViolation
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"2.."}[24h])) by (job)
            /
            sum(rate(http_server_requests_seconds_count[24h])) by (job)
          ) < 0.995
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.job }} 24小时可用性低于99.5%"
          description: "当前可用性: {{ $value | humanizePercentage }}"
      
      # API响应时间SLO
      - alert: SLOResponseTimeViolation
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[1h])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API响应时间超过SLO (P95 > 1s)"
          description: "当前P95: {{ $value }}s"

# ==================== 告警静默配置 ====================
