version: '3.8'

services:
  # Keycloak Database (PostgreSQL)
  keycloak-db:
    image: postgres:15-alpine
    container_name: edams-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret_password}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - edams-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Server
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: edams-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret_password}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_HOSTNAME_STRICT_HTTPS: ${KEYCLOAK_HOSTNAME_STRICT_HTTPS:-false}
      KC_HTTP_ENABLED: ${KEYCLOAK_HTTP_ENABLED:-true}
      KC_HTTP_PORT: ${KEYCLOAK_HTTP_PORT:-8180}
      KC_HTTPS_PORT: ${KEYCLOAK_HTTPS_PORT:-8543}
      KC_PROXY: edge
      KC_LOG_LEVEL: INFO
      KC_METRICS_ENABLED: ${KEYCLOAK_METRICS_ENABLED:-true}
      # Database pooling
      KC_DB_POOL_MIN: 5
      KC_DB_POOL_MAX: 20
    volumes:
      - ./realms:/opt/keycloak/data/import
      - keycloak-data:/opt/keycloak/data
    ports:
      - "8180:8080"
      - "8543:8443"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - edams-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;if [ $? -eq 0 ];then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Optional: Keycloak Metrics Exporter
  keycloak-metrics:
    image: nacros/keycloak-metrics-spi:3.0.0
    container_name: edams-keycloak-metrics
    volumes:
      - ./keycloak-metrics-spi.jar:/opt/keycloak/providers/keycloak-metrics-spi.jar
    depends_on:
      - keycloak
    networks:
      - edams-network
    restart: unless-stopped

networks:
  edams-network:
    driver: bridge

volumes:
  keycloak-db-data:
    driver: local
  keycloak-data:
    driver: local
