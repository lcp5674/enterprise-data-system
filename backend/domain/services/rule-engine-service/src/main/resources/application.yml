server:
  port: 8018

spring:
  application:
    name: rule-engine-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edams_rules}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 9
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: rule-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.enterprise.dataplatform.*

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Nacos配置
nacos:
  server-addr: ${NACOS_SERVER:localhost:8848}
  namespace: ${NACOS_NAMESPACE:}
  group: ${NACOS_GROUP:DEFAULT_GROUP}

# Kafka主题配置
kafka:
  topics:
    rule-events: rule-events
    rule-evaluations: rule-evaluations
    governance-tasks: governance-tasks

# Drools规则引擎配置
drools:
  rules:
    paths: classpath:rules/
  kie:
    resources: META-INF/kie/
  reload:
    enabled: true
    interval-seconds: 300

# Swagger配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: 'rules'
      paths-to-match: '/api/rules/**'
      packages-to-scan: com.enterprise.dataplatform.ruleengine.controller

# 日志配置
logging:
  level:
    root: INFO
    com.enterprise.dataplatform.ruleengine: DEBUG
    org.kie: INFO
    org.drools: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
