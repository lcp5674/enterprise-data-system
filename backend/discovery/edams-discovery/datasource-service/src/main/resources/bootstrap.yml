spring:
  cloud:
    nacos:
      # Nacos服务发现配置
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:EDAMS_GROUP}
        metadata:
          service-type: datasource-service
          version: 1.0.0
      # Nacos配置中心配置
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:EDAMS_GROUP}
        file-extension: yml
        refresh-enabled: true
        # 共享配置
        shared-configs:
          - data-id: common.yml
            group: COMMON_GROUP
            refresh: true
