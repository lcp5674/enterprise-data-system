server:
  port: 8103
# 注意：移除 context-path，Spring Cloud Gateway 通过 lb:// 直连服务根路径
# 旧配置 context-path: /search 已废弃，会导致路由路径错误

spring:
  application:
    name: search-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/edams_search
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  elasticsearch:
    uris: http://localhost:9200

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.enterprise.edams.search: DEBUG
  file:
    name: logs/search-service.log
