server:
  port: 8102
# 注意：移除 context-path，Spring Cloud Gateway 通过 lb:// 直连服务根路径
# 旧配置 context-path: /datamap 已废弃，会导致路由路径错误

spring:
  application:
    name: datamap-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/edams_datamap
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.enterprise.edams.datamap: DEBUG
  file:
    name: logs/datamap-service.log
