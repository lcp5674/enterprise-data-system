spring:
  application:
    name: edams-notification
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
        file-extension: yml
        refresh-enabled: true

server:
  port: 8084
# 注意：移除 context-path，因为 Spring Cloud Gateway 已通过 lb:// 路由直接访问服务根路径
# 旧配置 context-path: /edams-notification 已废弃

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edams}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:noreply@edams.com}
    password: ${SMTP_PASS:password123}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:redis123}
  database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.edams.notification.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 通知服务配置
notification:
  email:
    from: ${SMTP_FROM:edams-noreply@edams.com}
    reply-to: ${SMTP_REPLY_TO:support@edams.com}
    smtp-timeout: ${SMTP_TIMEOUT:5000}
  sms:
    provider: ${SMS_PROVIDER:aliyun}
    api-url: ${SMS_API_URL:https://dysmsapi.aliyuncs.com}
    access-key: ${SMS_ACCESS_KEY:}
    secret-key: ${SMS_SECRET_KEY:}
    sign-name: ${SMS_SIGN_NAME:EDAMS数据平台}
    template-code: ${SMS_TEMPLATE_CODE:}
  webhook:
    wechat-webhook-enabled: true
    dingtalk-webhook-enabled: true
    feishu-webhook-enabled: true
    connect-timeout: ${WEBHOOK_TIMEOUT:3000}
    read-timeout: ${WEBHOOK_TIMEOUT:10000}

management:
  endpoints.web.exposure.include: health,info,metrics

logging:
  level:
    root: INFO
    com.enterprise.edams.notification: DEBUG
