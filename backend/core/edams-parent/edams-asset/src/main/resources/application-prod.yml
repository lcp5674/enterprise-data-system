spring:
  application:
    name: edams-asset
  profiles:
    active: prod
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        group: EDAMS_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        group: EDAMS_GROUP
        file-extension: yml
        refresh-enabled: true

server:
  port: 8082

# ==================== 生产环境数据库连接池优化 ====================
# HikariCP 生产环境推荐配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edams}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    hikari:
      # 连接池大小配置（根据服务器CPU核心数和数据库连接数调整）
      # 推荐公式: connections = ((core_count * 2) + effective_spindle_count)
      # 对于SSD: connections = ((core_count * 2) + 10)
      minimum-idle: 10
      maximum-pool-size: 50
      # 连接超时 - 生产环境建议30秒
      connection-timeout: 30000
      # 空闲超时 - 超过10分钟未使用的连接将被回收
      idle-timeout: 600000
      # 连接最大生命周期 - 30分钟
      max-lifetime: 1800000
      # 连接泄漏检测阈值 - 2秒
      leak-detection-threshold: 2000
      # 连接测试查询（MySQL推荐）
      connection-test-query: SELECT 1
      # 是否自动提交
      auto-commit: true
      # 池名称（用于日志）
      pool-name: EDAMS-Asset-HikariPool
      # 允许最大溢出连接数（在达到maximum-pool-size后允许额外创建的连接）
      maximum-soft-eviction-margin: 30000

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.edams.asset.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭SQL日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redis配置 - 生产环境连接池优化
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

# Kafka配置 - 生产环境优化
spring:
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    consumer:
      group-id: edams-asset-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      max-poll-records: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
    listener:
      concurrency: 3
      ack-mode: manual

# Elasticsearch配置
spring:
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}
    connection-timeout: 5s
    socket-timeout: 30s

# Actuator配置 - 生产环境安全暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    elasticsearch:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

# 日志配置 - 生产环境
logging:
  level:
    root: WARN
    com.enterprise.edams: INFO
    org.springframework.web: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/edams/asset-service.log
    max-size: 100MB
    max-history: 30

# Swagger配置 - 生产环境关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
