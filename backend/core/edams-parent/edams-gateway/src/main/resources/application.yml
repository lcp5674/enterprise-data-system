spring:
  application:
    name: edams-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
        file-extension: yml
        refresh-enabled: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # ==================== 路由配置（共24条） ====================
      routes:
        # ---- 1. 认证服务 (edams-auth) ----
        - id: edams-auth
          uri: lb://edams-auth
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-auth
            priority: 1

        # ---- 2. 用户管理服务 (edams-user) ----
        - id: edams-user
          uri: lb://edams-user
          predicates:
            - Path=/api/v1/users/**, /api/v1/departments/**, /api/v1/roles/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-user
            priority: 2

        # ---- 3. 权限服务 (edams-permission) ----
        - id: edams-permission
          uri: lb://edams-permission
          predicates:
            - Path=/api/v1/permissions/**, /api/v1/menus/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-permission
            priority: 2

        # ---- 4. 资产管理服务 (edams-asset) ----
        - id: edams-asset
          uri: lb://edams-asset
          predicates:
            - Path=/api/v1/assets/**, /api/v1/catalogs/**, /api/v1/datasources/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-asset
            priority: 5

        # ---- 5. 元数据服务 (metadata-service) ----
        - id: metadata-service
          uri: lb://metadata-service
          predicates:
            - Path=/api/v1/metadata/**
          filters:
            - StripPrefix=1
          metadata:
            service: metadata-service
            priority: 4

        # ---- 6. 数据血缘服务 (lineage-service) ----
        - id: lineage-service
          uri: lb://lineage-service
          predicates:
            - Path=/api/v1/lineage/**
          filters:
            - StripPrefix=1
          metadata:
            service: lineage-service
            priority: 6

        # ---- 7. 质量服务 (quality-service) ----
        - id: quality-service
          uri: lb://quality-service
          predicates:
            - Path=/api/v1/quality/**, /api/v1/rules/**
          filters:
            - StripPrefix=1
          metadata:
            service: quality-service
            priority: 7

        # ---- 8. 标准服务 (standard-service) ----
        - id: standard-service
          uri: lb://standard-service
          predicates:
            - Path=/api/v1/standards/**, /api/v1/compliance/**
          filters:
            - StripPrefix=1
          metadata:
            service: standard-service
            priority: 8

        # ---- 9. 治理引擎 (governance-engine) ----
        - id: governance-engine
          uri: lb://governance-engine
          predicates:
            - Path=/api/v1/governance/**
          filters:
            - StripPrefix=1
          metadata:
            service: governance-engine
            priority: 9

        # ---- 10. 审批流服务 (edams-workflow) ----
        - id: edams-workflow
          uri: lb://edams-workflow
          predicates:
            - Path=/api/v1/workflows/**, /api/v1/approvals/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-workflow
            priority: 10

        # ---- 11. 通知服务 (edams-notification) ----
        - id: edams-notification
          uri: lb://edams-notification
          predicates:
            - Path=/api/v1/notifications/**, /api/v1/messages/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-notification
            priority: 10

        # ---- 12. 知识图谱服务 (edams-knowledge) ----
        - id: edams-knowledge
          uri: lb://edams-knowledge
          predicates:
            - Path=/api/v1/knowledge/**, /api/v1/ontology/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-knowledge
            priority: 15

        # ---- 13. LLM大模型服务 (edams-llm) ----
        - id: edams-llm
          uri: lb://edams-llm
          predicates:
            - Path=/api/v1/llm/**, /api/v1/chat/**, /api/v1/ai/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-llm
            priority: 16

        # ---- 14. 生命周期服务 (edams-lifecycle) ----
        - id: edams-lifecycle
          uri: lb://edams-lifecycle
          predicates:
            - Path=/api/v1/lifecycle/**, /api/v1/archive/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-lifecycle
            priority: 12

        # ---- 15. 版本管理服务 (edams-version) ----
        - id: edams-version
          uri: lb://edams-version
          predicates:
            - Path=/api/v1/versions/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-version
            priority: 13

        # ---- 16. 协作服务 (edams-collaboration) ----
        - id: edams-collaboration
          uri: lb://edams-collaboration
          predicates:
            - Path=/api/v1/collaborations/**, /api/v1/comments/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-collaboration
            priority: 14

        # ---- 17. 智能运维服务 (edams-aiops) ----
        - id: edams-aiops
          uri: lb://edams-aiops
          predicates:
            - Path=/api/v1/aiops/**, /api/v1/alerts/**, /api/v1/metrics/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-aiops
            priority: 17

        # ---- 18. 沙箱服务 (sandbox-service) ----
        - id: sandbox-service
          uri: lb://sandbox-service
          predicates:
            - Path=/api/v1/sandbox/**, /api/v1/preview/**
          filters:
            - StripPrefix=1
          metadata:
            service: sandbox-service
            priority: 18

        # ---- 19. SLA监控服务 (sla-service) ----
        - id: sla-service
          uri: lb://sla-service
          predicates:
            - Path=/api/v1/sla/**, /api/v1/slo/**
          filters:
            - StripPrefix=1
          metadata:
            service: sla-service
            priority: 19

        # ---- 20. 数据价值评估服务 (value-service) ----
        - id: value-service
          uri: lb://value-service
          predicates:
            - Path=/api/v1/value/**, /api/v1/assessment/**
          filters:
            - StripPrefix=1
          metadata:
            service: value-service
            priority: 20

        # ---- 21. 数字水印服务 (watermark-service) ----
        - id: watermark-service
          uri: lb://watermark-service
          predicates:
            - Path=/api/v1/watermarks/**, /api/v1/tracing/**
          filters:
            - StripPrefix=1
          metadata:
            service: watermark-service
            priority: 21

        # ---- 22. 积分激励服务 (incentive-service) ----
        - id: incentive-service
          uri: lb://incentive-service
          predicates:
            - Path=/api/v1/incentives/**, /api/v1/points/**
          filters:
            - StripPrefix=1
          metadata:
            service: incentive-service
            priority: 22

        # ---- 23. 边缘IoT服务 (edge-iot-service) ----
        - id: edge-iot-service
          uri: lb://edge-iot-service
          predicates:
            - Path=/api/v1/iot/**, /api/v1/devices/**, /api/v1/sensors/**
          filters:
            - StripPrefix=1
          metadata:
            service: edge-iot-service
            priority: 23

        # ---- 24. AI对话机器人 (edams-chatbot) ----
        - id: edams-chatbot
          uri: lb://edams-chatbot
          predicates:
            - Path=/api/v1/chatbot/**, /api/v1/bot/**
          filters:
            - StripPrefix=1
          metadata:
            service: edams-chatbot
            priority: 24

        # ---- 管理后台服务 ----
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**, /api/v1/system/**, /api/v1/config/**
          filters:
            - StripPrefix=1
          metadata:
            service: admin-service
            priority: 25

        # ---- 工作台门户服务 ----
        - id: portal-service
          uri: lb://portal-service
          predicates:
            - Path=/api/v1/portal/**, /api/v1/dashboard/**, /api/v1/announcements/**
          filters:
            - StripPrefix=1
          metadata:
            service: portal-service
            priority: 26

        # ---- 全文搜索服务 ----
        - id: index-service
          uri: lb://index-service
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=1
          metadata:
            service: index-service
            priority: 27

        # ---- 规则引擎服务 ----
        - id: rule-engine-service
          uri: lb://rule-engine-service
          predicates:
            - Path=/api/v1/rules/engine/**, /api/v1/drools/**
          filters:
            - StripPrefix=1
          metadata:
            service: rule-engine-service
            priority: 28

        # ---- 分析服务 ----
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=1
          metadata:
            service: analytics-service
            priority: 29

server:
  port: 8888

# Redis配置（用于限流和认证）
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:redis123}
  database: 0

# JWT密钥配置（与auth服务保持一致）
# ⚠️ 重要：JWT_SECRET 必须在环境变量或K8s Secret中设置，禁止使用默认值！
jwt:
  secret: ${JWT_SECRET:}

# 网关限流配置
gateway:
  rate-limit:
    ip:
      requests-per-second: 100
      requests-per-minute: 500
    user:
      requests-per-second: 50
      requests-per-minute: 200
    global:
      requests-per-second: 2000

# Actuator配置（网关监控）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.enterprise.edams.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
