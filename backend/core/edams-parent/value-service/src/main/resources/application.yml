server:
  port: 8093
  servlet:
    context-path: /value

spring:
  application:
    name: value-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/edams_value?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.edams.value: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/value-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
