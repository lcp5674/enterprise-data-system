server:
  port: 8113
# 注意：移除 context-path，因为 Spring Cloud Gateway 已通过 lb:// 路由直接访问服务根路径
# 旧配置 context-path: /api/value 已废弃
# 原端口 8093 与 domain/portal-service 冲突，改为 8113

spring:
  application:
    name: value-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/edams_value?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.edams.value: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/value-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
