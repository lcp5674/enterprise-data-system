server:
  port: 8104
# 注意：移除 context-path，因为 Spring Cloud Gateway 已通过 lb:// 路由直接访问服务根路径
# 旧配置 context-path: /api/sandbox 已废弃
# 原端口 8084 与 edams-notification 冲突，改为 8104

spring:
  application:
    name: sandbox-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/edams_sandbox?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  redis:
    host: localhost
    port: 6379
    database: 4
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: sandbox-group
  
  elasticsearch:
    uris: http://localhost:9200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.edams.sandbox: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  file:
    name: logs/sandbox-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
  hystrix:
    enabled: true

hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 10000

ribbon:
  ConnectTimeout: 5000
  ReadTimeout: 10000
  OkToRetryOnAllOperations: false
  MaxAutoRetries: 0
  MaxAutoRetriesNextServer: 1
  ServerListRefreshInterval: 2000

sandbox:
  config:
    max-sandboxes-per-user: 10
    default-expire-hours: 24
    execution-timeout: 300000  # 5分钟
    sql-execution:
      max-rows: 1000
      timeout: 30000  # 30秒
    api-test:
      timeout: 10000  # 10秒