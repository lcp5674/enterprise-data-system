spring:
  application:
    name: edams-auth
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
        file-extension: yml
        refresh-enabled: true

server:
  port: 8081
  servlet:
    context-path: /edams-auth

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edams}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}

# Redis配置
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 0
  session:
    store-type: redis
    redis:
      namespace: edams:session
    timeout: 3600s

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.edams.auth.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:edams-jwt-secret-key-2026}
  expiration: 86400000
  refresh-expiration: 604800000

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.enterprise.edams: DEBUG
