spring:
  application:
    name: edams-analytics
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: EDAMS_GROUP
        file-extension: yml
        refresh-enabled: true

server:
  port: 8083
  servlet:
    context-path: /edams-analytics

# 数据库配置 (用于存储分析配置)
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edams}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}

# ClickHouse配置 (OLAP引擎)
clickhouse:
  url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:default}
  username: ${CLICKHOUSE_USERNAME:default}
  password: ${CLICKHOUSE_PASSWORD:}
  connection-pool:
    size: 20
    max-size: 50
    min-size: 5
    connection-timeout: 30000
    socket-timeout: 300000

# Redis配置 (查询缓存)
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 1

# Kafka配置 (异步分析任务)
spring:
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    consumer:
      group-id: edams-analytics-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.edams.analytics.entity
  configuration:
    map-underscore-to-camel-case: true

# 分析查询配置
analytics:
  # 查询超时时间(秒)
  query-timeout: 300
  # 最大查询行数
  max-result-rows: 100000
  # 查询缓存过期时间(秒)
  cache-expire-seconds: 300
  # 最大并发查询数
  max-concurrent-queries: 50

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.enterprise.edams: DEBUG
    com.clickhouse: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Swagger配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
