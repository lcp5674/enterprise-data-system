spring:
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:EDAMS_GROUP}
        metadata:
          service-type: model-service
          version: 1.0.0
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:EDAMS_GROUP}
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          - data-id: common.yml
            group: COMMON_GROUP
            refresh: true
