# EDAMS 测试配置
# 用于本地开发和CI/CD环境

spring:
  application:
    name: edams-test

# 数据库配置 - TestContainers
  datasource:
    url: jdbc:mysql://${TESTcontainers.mysql.host:localhost}:${TESTCONTAINERS_MYSQL_PORT:3306}/edams_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: test
    password: test123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: ${TESTCONTAINERS_REDIS_HOST:localhost}
      port: ${TESTCONTAINERS_REDIS_PORT:6379}

# Kafka配置
  kafka:
    bootstrap-servers: ${TESTCONTAINERS_KAFKA_HOST:localhost}:${TESTCONTAINERS_KAFKA_PORT:9092}
    consumer:
      group-id: edams-test-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

# Elasticsearch配置
  elasticsearch:
    uris: http://${TESTCONTAINERS_ES_HOST:localhost}:${TESTCONTAINERS_ES_PORT:9200}

# 服务配置
server:
  port: 0  # 随机端口用于测试

# JWT配置
jwt:
  secret: test-jwt-secret-key-for-testing-purposes-only-do-not-use-in-production
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: Bearer

# 测试专用配置
test:
  enabled: true
  cleanup:
    after-test: true
  parallel:
    enabled: false

# 日志配置
logging:
  level:
    root: INFO
    com.enterprise: DEBUG
    org.springframework.test: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
