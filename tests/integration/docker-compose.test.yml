version: '3.8'

services:
  # MySQL TestContainer
  mysql-test:
    image: mysql:8.0
    container_name: edams-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edams_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test123
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis TestContainer
  redis-test:
    image: redis:7-alpine
    container_name: edams-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka TestContainer
  kafka-test:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edams-kafka-test
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper-test

  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: edams-zookeeper-test
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # Elasticsearch TestContainer
  elasticsearch-test:
    image: elasticsearch:8.10.0
    container_name: edams-es-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
